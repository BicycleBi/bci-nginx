# Nginx configuration for BCI Deployment Host
# - Receives all incoming web traffic
# - Authenticates every proxied request through the Security Module
# - Proxies authorized requests to the Query Engine only

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    upstream query_engine {
        server query-engine:8080;
    }

    upstream security_service {
        server security:8081;
    }

    map $auth_redirect $login_redirect {
        default $auth_redirect;
        ""      https://login.microsoftonline.com/;
    }

    server {
        listen       80;
        server_name  _;

        location = /healthz {
            access_log off;
            return 200 'ok';
        }

        location /login {
            proxy_pass http://security_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/callback {
            proxy_pass http://security_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            auth_request /_auth;
            auth_request_set $auth_redirect $upstream_http_location;
            auth_request_set $identity_token $upstream_http_authorization;
            auth_request_set $identity_user_id $upstream_http_x_identity_user_id;
            auth_request_set $identity_email $upstream_http_x_identity_email;
            auth_request_set $identity_name $upstream_http_x_identity_name;
            auth_request_set $identity_roles $upstream_http_x_identity_roles;
            auth_request_set $identity_client_key $upstream_http_x_identity_client_key;

            proxy_pass http://query_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $identity_token;
            proxy_set_header X-Identity-User-Id $identity_user_id;
            proxy_set_header X-Identity-Email $identity_email;
            proxy_set_header X-Identity-Name $identity_name;
            proxy_set_header X-Identity-Roles $identity_roles;
            proxy_set_header X-Identity-Client-Key $identity_client_key;
        }

        location = /_auth {
            internal;
            proxy_pass http://security_service/auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        error_page 401 = @error401;
        error_page 403 = @error403;

        location @error401 {
            return 302 $login_redirect;
        }

        location @error403 {
            default_type text/html;
            return 403 '<!doctype html><html><head><title>Forbidden</title></head><body><h1>Forbidden</h1><p>You do not have access to this resource.</p></body></html>';
        }
    }
}
